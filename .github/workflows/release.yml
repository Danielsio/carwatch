name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type (overrides commit message detection)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Version, Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Manual dispatch: use the explicit bump_type input
          if [ -n "${{ inputs.bump_type }}" ]; then
            BUMP="${{ inputs.bump_type }}"
            echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
            echo "Bump type (manual): $BUMP"
            exit 0
          fi

          # Push trigger: parse from commit message
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_BODY=$(git log -1 --pretty=%b)
          echo "Commit message: $COMMIT_MSG"

          # For "Merge pull request #N" commits, extract the PR title
          if echo "$COMMIT_MSG" | grep -qE '^Merge pull request #'; then
            PR_NUM=$(echo "$COMMIT_MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
            MSG=$(gh pr view "$PR_NUM" --json title -q .title 2>/dev/null || echo "$COMMIT_MSG")
          else
            MSG="$COMMIT_MSG"
          fi
          echo "Parsed message: $MSG"

          if echo "$MSG" | grep -qiE '(^[a-z]+(\(.+\))?!:)' || echo "$COMMIT_BODY" | grep -qiE 'BREAKING CHANGE'; then
            BUMP=major
          elif echo "$MSG" | grep -qiE '^feat(\(.+\))?:'; then
            BUMP=minor
          else
            BUMP=patch
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP"

      - name: Compute next version from tags
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LATEST_TAG#v}"
          fi
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ steps.bump.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=${{ steps.version.outputs.version }}
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/danielsio/carwatch:${{ steps.version.outputs.version }}
            ghcr.io/danielsio/carwatch:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: docker-compose.prod.yaml

      - name: Sync compose file to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yaml
          target: ~/carwatch/

      - name: Pull, recreate and health-check
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "$HOME/carwatch"

            # Source .env if present (CARWATCH_DOMAIN, TELEGRAM_BOT_TOKEN, etc.)
            if [ -f .env ]; then
              set -a; source .env; set +a
            fi

            # Ensure the shared network exists
            docker network create carwatch-net 2>/dev/null || true

            # Remove any manually-created container so compose can take over
            docker stop carwatch 2>/dev/null || true
            docker rm carwatch 2>/dev/null || true

            echo "==> Pulling latest image..."
            docker compose -f docker-compose.prod.yaml pull carwatch

            echo "==> Recreating container..."
            docker compose -f docker-compose.prod.yaml up -d --no-deps carwatch

            echo "==> Waiting for health check..."
            for i in $(seq 1 15); do
              if docker exec carwatch wget -q --spider http://localhost:8080/healthz 2>/dev/null; then
                echo "==> Health check passed!"
                docker exec carwatch /bot -version
                exit 0
              fi
              echo "    attempt $i/15 — waiting 5s..."
              sleep 5
            done

            echo "==> Health check failed after 75s"
            docker inspect carwatch --format 'status={{.State.Status}} exit={{.State.ExitCode}} started={{.State.StartedAt}}'
            echo "==> Container logs (last 80 lines):"
            docker logs carwatch --tail 80 2>&1 || true
            exit 1
