name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Version, Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump from merge commit
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_BODY=$(git log -1 --pretty=%b)
          echo "Commit message: $COMMIT_MSG"

          # For "Merge pull request #N" commits, extract the PR title
          if echo "$COMMIT_MSG" | grep -qE '^Merge pull request #'; then
            PR_NUM=$(echo "$COMMIT_MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
            MSG=$(gh pr view "$PR_NUM" --json title -q .title 2>/dev/null || echo "$COMMIT_MSG")
          else
            MSG="$COMMIT_MSG"
          fi
          echo "Parsed message: $MSG"

          if echo "$MSG" | grep -qiE '(^[a-z]+(\(.+\))?!:)' || echo "$COMMIT_BODY" | grep -qiE 'BREAKING CHANGE'; then
            BUMP=major
          elif echo "$MSG" | grep -qiE '^feat(\(.+\))?:'; then
            BUMP=minor
          else
            BUMP=patch
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP"

      - name: Bump version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_VERSION=$(./scripts/bump-version.sh ${{ steps.bump.outputs.bump }})
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Commit version bump and tag
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git add VERSION
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin main --follow-tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/danielsio/carwatch:${{ steps.version.outputs.version }}
            ghcr.io/danielsio/carwatch:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes
