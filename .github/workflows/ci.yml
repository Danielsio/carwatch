name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - '.github/workflows/**'
      - 'docker-compose*.yaml'
      - 'web/**'

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
            web:
              - 'web/**'
            infra:
              - 'Dockerfile'
              - '.github/workflows/**'
              - 'docker-compose*.yaml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Stub web/dist for embed
        run: mkdir -p web/dist && echo '<!doctype html>' > web/dist/index.html
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.4
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Stub web/dist for embed
        run: mkdir -p web/dist && echo '<!doctype html>' > web/dist/index.html
      - name: Install C compiler (sqlite3)
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Run tests
        run: make test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: .coverage/

  web:
    name: Web Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: cd web && npm ci
      - name: Type check
        run: cd web && npx tsc -b
      - name: Build
        run: cd web && npm run build
      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [changes, lint, test, web]
    if: |
      always() &&
      needs.changes.outputs.infra == 'true' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.web.result == 'success' || needs.web.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
        continue-on-error: true
      - name: Stub web/dist if not built
        run: |
          if [ ! -f web/dist/index.html ]; then
            mkdir -p web/dist && echo '<!doctype html>' > web/dist/index.html
          fi
      - name: Build binary
        run: make build
      - name: Build Docker image
        run: docker build -t carwatch:ci .
